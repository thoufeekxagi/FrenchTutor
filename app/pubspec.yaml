name: french_tutor
description: AI French learning tutor — speak and learn French on the go.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.1
  record: ^5.2.0
  just_audio: ^0.9.43
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  sqflite: ^2.4.1
  uuid: ^4.5.1
  intl: ^0.20.1
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lucide_icons: ^0.461.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
