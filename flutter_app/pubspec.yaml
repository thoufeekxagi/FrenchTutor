name: french_tutor
description: AI French learning tutor — speak and learn French on the go.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  drift: ^2.22.1
  sqlite3: ^2.4.7
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.5
  http: ^1.3.0
  web_socket_channel: ^3.0.3
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  flutter_sound: ^9.30.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true

  assets:
    - assets/content/
