name: french_tutor
description: AI French learning tutor — speak and learn French on the go.
publish_to: 'none'
version: 1.0.0+66

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  drift: ^2.22.1
  sqlite3: ^2.4.7
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.5
  http: ^1.3.0
  web_socket_channel: ^3.0.3
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  flutter_sound: ^9.30.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.20.2
  audio_session: ^0.2.4
  logger: ^2.7.0
  supabase_flutter: ^2.16.0
  # Pinned to the 6.x line deliberately, NOT the latest 7.x: v7 is a ground-up
  # API rewrite whose iOS ID-token retrieval path isn't fully documented yet,
  # while 6.x is exactly the API Supabase's own official signInWithIdToken
  # docs demonstrate. Revisit only once Supabase's docs/examples move to v7.
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^8.1.0
  crypto: ^3.0.7
  url_launcher: ^6.3.1
  purchases_flutter: ^8.6.0
  # Readle-style interactive walkthrough: dims the real screen, spotlights one
  # live control at a time with a numbered card. Pure Flutter overlay — same
  # behavior on iOS, Android, and web.
  tutorial_coach_mark: ^1.2.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true

  # Build ALL iOS plugins via CocoaPods, never Swift Package Manager.
  # permission_handler_apple's SPM manifest auto-detects permissions by
  # locating the app's Info.plist at manifest-evaluation time — a lookup
  # that is working-directory-dependent and CACHED by Xcode, and it
  # evaluated to "microphone disabled" on this machine: the app could never
  # show the iOS mic prompt. Under CocoaPods, the PERMISSION_MICROPHONE=1
  # macro in ios/Podfile applies deterministically. flutter_sound and
  # flutter_tts require CocoaPods anyway, so nothing is lost.
  config:
    enable-swift-package-manager: false

  assets:
    - assets/content/
    - assets/audio/tutor_previews/
    - assets/images/
